name: 每日新闻自动推送（企业微信版）

# 触发条件：每天北京时间10点自动运行 + 支持手动触发
on:
  schedule:
    - cron: "0 2 * * *"  # UTC时间2点 = 北京时间10点，可自行调整
  workflow_dispatch:  # 允许手动在GitHub页面触发

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行推送脚本
        env:
          # 从GitHub Secrets读取WebHook，安全不泄露
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        run: python news_sender.py
